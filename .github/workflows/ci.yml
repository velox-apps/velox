name: CI

on:
  push:
    branches: [linux]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-2022, ubuntu-24.04]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift (Unix)
        if: runner.os != 'Windows'
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Setup Swift (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $swiftVersion = "6.2.4"
          $swiftSha256 = "222501D4A0EF6EC3B2F08B3E0055140BB3A5136527542239BB925F979689F4AD"
          $installer = Join-Path $env:RUNNER_TEMP "swift-$swiftVersion-windows.exe"
          $url = "https://download.swift.org/swift-$swiftVersion-release/windows10/swift-$swiftVersion-RELEASE/swift-$swiftVersion-RELEASE-windows10.exe"

          Invoke-WebRequest -Uri $url -OutFile $installer

          $actualSha256 = (Get-FileHash $installer -Algorithm SHA256).Hash
          if ($actualSha256 -ne $swiftSha256) {
            throw "Swift installer checksum mismatch. Expected $swiftSha256, got $actualSha256."
          }

          $process = Start-Process -FilePath $installer -ArgumentList '/quiet', '/norestart' -Wait -PassThru
          if ($process.ExitCode -notin 0, 3010) {
            throw "Swift installer failed with exit code $($process.ExitCode)."
          }

          foreach ($level in "Machine", "User") {
            [Environment]::GetEnvironmentVariables($level).GetEnumerator() |
              ForEach-Object {
                if ($_.Name -eq "Path") {
                  $_.Value = ("$env:Path;$($_.Value)" -split ';' | Select-Object -Unique) -join ';'
                }
                $_
              } |
              Set-Content -Path { "Env:$($_.Name)" }
          }

          $swift = Get-Command swift.exe -ErrorAction SilentlyContinue

          if (-not $swift) {
            $searchRoots = @(
              "$env:LOCALAPPDATA\Programs\Swift\Toolchains",
              "$env:ProgramFiles\Swift\Toolchains",
              "C:\Library\Developer\Toolchains"
            ) | Where-Object { Test-Path $_ }

            foreach ($root in $searchRoots) {
              $toolchain = Get-ChildItem $root -Directory -ErrorAction SilentlyContinue |
                Sort-Object Name -Descending |
                Select-Object -First 1

              if ($toolchain) {
                $candidate = Join-Path $toolchain.FullName "usr\bin\swift.exe"
                if (Test-Path $candidate) {
                  $swift = @{ Source = $candidate }
                  break
                }
              }
            }
          }

          if (-not $swift) {
            throw "Swift toolchain not found after installation."
          }

          $swiftBin = Split-Path -Parent $swift.Source
          Add-Content -Path $env:GITHUB_PATH -Value $swiftBin

          Get-ChildItem Env: | ForEach-Object {
            "$($_.Name)=$($_.Value)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Show tool versions (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          where.exe swift
          swift --version
          if ($LASTEXITCODE -ne 0) {
            throw "swift --version failed with exit code $LASTEXITCODE."
          }
          cargo --version
          rustc --version

      - name: Show tool versions (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          command -v swift
          swift --version
          cargo --version
          rustc --version

      - name: Show tool versions (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          command -v swift
          swift --version
          cargo --version
          rustc --version

      - name: Build Rust FFI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cargo build --manifest-path runtime-wry-ffi/Cargo.toml

      - name: Build Rust FFI (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          cargo build --manifest-path runtime-wry-ffi/Cargo.toml

      - name: Build Swift package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          VELOX_CARGO_ONLINE: "1"
        run: swift build --disable-sandbox

      - name: Build Swift package (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          VELOX_CARGO_ONLINE: "1"
        run: |
          set -euo pipefail
          swift build --disable-sandbox

      - name: Build Rust FFI (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          cargo build --manifest-path runtime-wry-ffi/Cargo.toml

      - name: Build Swift package (Linux)
        if: runner.os == 'Linux'
        shell: bash
        env:
          VELOX_CARGO_ONLINE: "1"
        run: |
          set -euo pipefail
          swift build --product velox
